<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="gio_circle_white_closeup2_512.png">
<link rel="apple-touch-icon" href="apple-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#007aff">
<meta name="apple-mobile-web-app-title" content="이름표">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="robots" content="noindex, nofollow">
<title>인생은 이름표 붙이기 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="style.css?v=62">
</head>
<body>

<!-- ─── 전역 오버레이 ─── -->
<div id="swipeCaptureOverlay" class="swipe-capture-overlay"></div>

<!-- ─── 리스트 꾹누르기 팝업 ─── -->
<div class="lp-popup-overlay" id="lpPopupOverlay" onclick="closeLpPopup()"></div>
<div class="lp-popup-card" id="lpPopupCard">
  <div class="lp-popup-menu" id="lpPopupMenu"></div>
</div>

<!-- ─── 로딩 화면 ─── -->
<div id="loadingScreen" class="hidden">
  <div class="loading-wrapper">
    <div class="loading-scene">
      <img src="gio_circle_white_closeup2_512.png" alt="지오" class="bounce-avatar">
      <div class="bounce-shadow"></div>
    </div>
    <div class="loading-text">불러오는 중</div>
  </div>
</div>

<!-- ─── 잠금 화면 (Google 로그인) ─── -->
<div id="lockScreen" class="hidden">
  <div class="lock-card">
    <div class="lock-brand">이름표 붙이기 게임</div>
    <div class="lock-desc">개인 기록 공간입니다. 로그인해주세요.</div>
    <div id="googleSignInBtn"></div>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<!-- ─── 플로팅 인라인 툴바 ─── -->
<div id="floatingToolbar">
  <button class="ft-btn" title="굵게"  data-cmd="bold"><b>B</b></button>
  <button class="ft-btn" title="기울임" data-cmd="italic"><i style="font-style:italic">I</i></button>
  <button class="ft-btn highlight-btn" title="형광펜" data-cmd="hiliteColor" data-val="#fde68a"><span class="hl-inner">A</span></button>
  <button class="ft-btn" title="취소선" data-cmd="strikeThrough"><s>S</s></button>
  <button class="ft-btn" title="밑줄"  data-cmd="underline"><u>U</u></button>
</div>

<!-- ─── 이미지 우클릭/꾹누르기 컨텍스트 메뉴 ─── -->
<div id="imgContextMenu" class="img-ctx-menu" style="position:fixed;">
  <div class="img-ctx-item" onclick="imgCtxAction('copy')">
    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    <span>복사</span>
  </div>
  <div class="img-ctx-sep"></div>
  <div class="img-ctx-item danger" onclick="imgCtxAction('delete')">
    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    <span>삭제</span>
  </div>
</div>

<!-- ─── 이미지 리사이즈 핸들 ─── -->
<div id="imgResizeHandle" class="img-resize-handle">
  <svg viewBox="0 0 44 44" width="44" height="44">
    <defs>
      <clipPath id="triClip">
        <path d="M44,0 Q44,0 44,2 L44,42 Q44,44 42,44 L2,44 Q0,44 0,42 L42,0 Q44,0 44,0 Z"/>
      </clipPath>
    </defs>
    <rect x="0" y="0" width="44" height="44" fill="rgba(255,255,255,.82)" clip-path="url(#triClip)"/>
    <circle cx="37" cy="17" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="31" cy="23" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="37" cy="23" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="25" cy="29" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="31" cy="29" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="37" cy="29" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="19" cy="35" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="25" cy="35" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="31" cy="35" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="13" cy="41" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="19" cy="41" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="25" cy="41" r="1.5" fill="#E55643" opacity=".5"/>
    <circle cx="31" cy="41" r="1.5" fill="#E55643" opacity=".5"/>
  </svg>
</div>

<!-- ═══════════════════════════════════════════════════
     메인 앱
════════════════════════════════════════════════════ -->
<div class="app view-list" id="mainApp" style="display:none;">
<div class="edge-swipe-zone edge-left" id="edgeLeft"></div>

<!-- ─── 사이드바 ─── -->
<div class="side">
  <div class="side-rubber" id="sideRubber"></div>
  <div class="header side-hdr">
    <div class="header-left brand-wrap">
      <img src="gio_circle_white_closeup2_512.png" alt="지오" class="cat-avatar avatar">
      <div class="brand">이름표 붙이기 게임</div>
    </div>
    <div class="sync-row">
      <div class="sync-status" onclick="SYNC.syncAll()">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncStatus">완료됨</span>
      </div>
      <button class="sync-btn" onclick="SYNC.syncAll()">↻</button>
      <button class="sync-cloud-btn" onclick="SYNC.syncAll()" id="syncCloudBtn" title="동기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.5 19a4.5 4.5 0 0 1-.42-8.98A7 7 0 0 1 13 5a6.97 6.97 0 0 1 6.79 5.32A4.5 4.5 0 0 1 17.5 19H6.5z"/>
          <line x1="12" y1="10" x2="12" y2="14"/>
          <circle cx="12" cy="16.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="side-scroll">
    <!-- 오늘의 어구 -->
    <div class="sec sec-border quote-section">
      <div class="sec-t">오늘의 어구</div>
      <div class="q-card quote-card" onclick="showRandomQuote()">
        <div class="quote-mark">"</div>
        <div class="quote-label" style="display:none;">오늘의 어구</div>
        <div class="q-content">
          <div class="q-text quote-text" id="quoteText">어구록에 문장을 추가해보세요</div>
          <div class="q-by quote-by" id="quoteBy"></div>
        </div>
      </div>
    </div>

    <!-- 글쓰기 탭 네비 -->
    <div class="sec sec-border side-nav" style="padding:8px 12px 12px">
      <div class="sec-t" style="margin-bottom:4px">글쓰기</div>
      <div id="sideNav" class="writing-grid"></div>
    </div>

    <!-- 데일리 루틴 -->
    <div class="sec sec-border">
      <div class="routine-full">
        <div class="sec-t">데일리 루틴</div>
        <div class="chk-table" id="chkTable"></div>
      </div>
      <div class="routine-compact" onclick="openRoutineDetail()">
        <div class="routine-compact-left">
          <canvas id="routineRing" width="44" height="44"></canvas>
          <div class="routine-compact-text">
            <span class="routine-compact-label">데일리 루틴</span>
            <span class="routine-compact-sub" id="routineCompactSub">0/7 완료</span>
          </div>
        </div>
        <svg class="routine-compact-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <!-- 가계부 -->
    <div class="sec sec-border">
      <div class="expense-compact" onclick="switchTab('expense')">
        <div class="expense-compact-left">
          <span class="expense-compact-label">가계부</span>
        </div>
        <div class="expense-compact-right">
          <span class="expense-compact-amount" id="expenseCompactAmount"></span>
          <svg class="expense-compact-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>

    <!-- 기록 통계 -->
    <div class="sec" style="padding-bottom:40px;">
      <div class="sec-t" style="display:flex; justify-content:space-between; align-items:center;">기록</div>
      <div class="stats-wrap">
        <div class="stat-col">
          <div class="stat-label">오늘 쓴 글</div>
          <div class="stat-big" id="wToday">0</div>
          <div class="stat-sub" id="wMonthSub">월간 0매 / 누적 0매</div>
        </div>
        <div class="stat-col">
          <div class="stat-label">읽은 책</div>
          <div class="stat-big" id="bToday">0</div>
          <div class="stat-sub" id="bMonthSub">월간 0p / 누적 0p</div>
        </div>
      </div>
    </div>
  </div>
</div><!-- /.side -->

<!-- ─── 리스트 패널 ─── -->
<div class="list-panel">
  <div class="swipe-edge" id="listSwipeEdge"></div>
  <div class="lp-hdr">
    <!-- PC 사이드바 토글 -->
    <button class="sb-toggle pc-sidebar-toggle" onclick="toggleSidebar()" title="사이드바 열기/닫기">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
    </button>
    <!-- 모바일 메뉴 버튼 -->
    <button class="sb-toggle mobile-nav-btn" onclick="setMobileView('side')" title="메뉴 열기">
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <!-- 뷰 스위처 (목록/사진/캘린더) -->
    <div class="view-switcher" id="viewSwitcher">
      <button class="vs-btn on" id="btn-list" onclick="switchListView('list')" title="목록">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="vs-btn" id="btn-photo" onclick="switchListView('photo')" title="사진">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <button class="vs-btn" id="btn-calendar" onclick="switchListView('calendar')" title="캘린더">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>
    </div>

    <!-- 검색 바 -->
    <div class="search-bar" id="searchBar">
      <button class="search-icon-btn lp-search-btn" onclick="toggleSearch()" title="검색">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
      <input type="text" id="searchInput" placeholder="#태그 또는 검색어" oninput="handleSearch(event)">
      <button id="clearSearchBtn" onclick="clearSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>

  <!-- 루틴 상세 패널 -->
  <div class="pane-routine" id="pane-routine" style="display:none">
    <div class="routine-card">
      <div class="routine-card-hdr">
        <span class="routine-card-title">데일리 루틴</span>
        <span class="routine-card-week" id="routineCardWeek"></span>
      </div>
      <div class="routine-card-body" id="routineCardBody"></div>
    </div>
    <div class="routine-streak"  id="routineStreak"></div>
    <div class="routine-monthly" id="routineMonthly"></div>
  </div>

  <!-- 리스트 패널 -->
  <div class="pane-list" id="pane-list"></div>

  <!-- 사진 패널 -->
  <div class="pane-photo" id="pane-photo">
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <!-- 캘린더 패널 -->
  <div class="pane-calendar" id="pane-calendar">
    <div class="cal-global-dow">
      <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
    </div>
    <div class="cal-wrap" id="calWrap"></div>
  </div>

  <!-- 가계부 대시보드 -->
  <div class="pane-expense-dashboard" id="pane-expense-dashboard" style="display:none">
    <div id="expenseDashboard"></div>
  </div>

  <!-- 가계부 전체 내역 -->
  <div class="pane-expense-detail" id="pane-expense-detail" style="display:none">
    <div id="expenseDetail"></div>
  </div>

  <!-- 새 글 FAB -->
  <button class="fab-btn" onclick="handleNew()" title="새 글 작성">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
      <path d="M15 5l4 4"/>
    </svg>
  </button>
</div><!-- /.list-panel -->

<!-- ─── 에디터 ─── -->
<div class="editor">
  <div class="editor-rubber" id="editorRubber"></div>
  <div class="swipe-edge" id="editorSwipeEdge"></div>

  <!-- 에디터 상단 바 -->
  <div class="col-header ed-topbar">
    <div class="ed-topbar-left">
      <button class="mobile-nav-btn mobile-back-btn" onclick="handleBackBtn()" title="목록으로 가기">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
    </div>
    <div class="ed-tab-label-wrap" id="edTabDropdown">
      <span class="ed-tab-label-text" id="edTabLabel">오늘의 네비</span>
    </div>
    <span id="edDate" style="display:none"></span>
    <span class="ed-save-status" id="edSaveStatus" style="display:none">저장됨</span>
    <div class="ed-topbar-right">
      <!-- Aa 서식 버튼 -->
      <button class="ed-aa-btn" onclick="toggleAaMenu(event)" title="서식">
        <svg viewBox="0 0 24 24" fill="none" stroke="none">
          <text x="3"  y="18" font-size="16" font-weight="700" fill="currentColor" font-family="serif">A</text>
          <text x="14" y="18" font-size="11" font-weight="600" fill="currentColor" font-family="serif">a</text>
        </svg>
      </button>
      <!-- 더보기 버튼 -->
      <button class="ed-more-btn" onclick="toggleEditorMenu(event)" title="더보기">
        <svg viewBox="0 0 24 24" fill="none" stroke="none">
          <circle cx="12" cy="5"  r="1.8" fill="currentColor"/>
          <circle cx="12" cy="12" r="1.8" fill="currentColor"/>
          <circle cx="12" cy="19" r="1.8" fill="currentColor"/>
        </svg>
      </button>
      <!-- + 새 글 버튼 (PC 전용) -->
      <button class="ed-new-btn pc-only" onclick="handleNew()" title="새 글">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
          <path d="M15 5l4 4"/>
        </svg>
      </button>
      <button class="ed-btn-done" onclick="handleDone()">완료</button>
    </div>
  </div>

  <!-- Aa 서식 드롭다운 -->
  <div id="aaDropdownMenu" class="aa-menu">
    <div class="aa-menu-grid">
      <button class="aa-item" onclick="aaAction('h1')"    title="제목 1"><span class="aa-icon">H<sub>1</sub></span></button>
      <button class="aa-item" onclick="aaAction('h2')"    title="제목 2"><span class="aa-icon">H<sub>2</sub></span></button>
      <button class="aa-item" onclick="aaAction('h3')"    title="제목 3"><span class="aa-icon">H<sub>3</sub></span></button>
      <button class="aa-item" onclick="aaAction('ul')"    title="목록">
        <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="9" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="aa-item" onclick="aaAction('ol')"    title="번호 목록">
        <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="9" font-size="8" font-family="sans-serif" stroke="none" fill="currentColor" font-weight="700">1.</text><text x="2" y="15" font-size="8" font-family="sans-serif" stroke="none" fill="currentColor" font-weight="700">2.</text><text x="2" y="21" font-size="8" font-family="sans-serif" stroke="none" fill="currentColor" font-weight="700">3.</text></svg>
      </button>
      <button class="aa-item" onclick="aaAction('check')" title="체크리스트">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </button>
      <button class="aa-item" onclick="aaAction('quote')" title="인용">
        <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
      </button>
      <button class="aa-item" onclick="aaAction('hr')"    title="구분선">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- 에디터 더보기 드롭다운 (레거시 — 팝업으로 대체됨) -->
  <div id="editorDropdownMenu" class="editor-menu" style="display:none;"></div>

  <!-- PC 서식 툴바 -->
  <div class="toolbar" id="edToolbar">
    <div style="position:relative;flex-shrink:0;">
      <button class="tb-heading-btn" id="headingBtn" onclick="toggleHeadingMenu()">
        <svg viewBox="0 0 24 24"><text x="2" y="18" font-size="18" font-weight="900" fill="currentColor" stroke="none" font-family="serif">H</text></svg>
        <svg class="caret" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="heading-dropdown" id="headingDropdown">
        <div class="heading-opt" onclick="applyHeading('h1')"><span class="h-label h1">제목</span><span class="h-size">H1</span></div>
        <div class="heading-opt" onclick="applyHeading('h2')"><span class="h-label h2">부제목</span><span class="h-size">H2</span></div>
        <div class="heading-opt" onclick="applyHeading('h3')"><span class="h-label h3">소제목</span><span class="h-size">H3</span></div>
      </div>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn" title="순서 없는 목록"  onclick="execCmd('insertUnorderedList')"><svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="9" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg></button>
    <button class="tb-btn" title="순서 있는 목록"  onclick="execCmd('insertOrderedList')"><svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="9" font-size="8" font-family="sans-serif" stroke="none" fill="currentColor" font-weight="700">1.</text><text x="2" y="15" font-size="8" font-family="sans-serif" stroke="none" fill="currentColor" font-weight="700">2.</text><text x="2" y="21" font-size="8" font-family="sans-serif" stroke="none" fill="currentColor" font-weight="700">3.</text></svg></button>
    <button class="tb-btn" title="체크리스트"        onclick="insertChecklist()"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" title="인용"             onclick="execCmd('formatBlock','blockquote')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg></button>
    <button class="tb-btn" title="구분선"            onclick="execCmd('insertHorizontalRule')"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" title="이미지 추가"       onclick="document.getElementById('fileInput').click()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
    <input type="file" id="mediaInput" accept="image/*,video/*"  style="display:none" onchange="handleMediaUpload(event)">
    <input type="file" id="fileInput"  style="display:none"       onchange="handleMediaUpload(event)">
  </div>

  <!-- 글쓰기 에디터 (일반 문서 / 메모) -->
  <div id="editorText" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="editor-scroll-area">
      <div class="editor-content-wrap">
        <input class="ed-title" id="edTitle" placeholder="제목">
        <div class="ed-body" id="edBody" contenteditable="true" spellcheck="false" translate="no"
             data-placeholder="여기에 글을 쓰세요... (이미지 복사+붙여넣기 가능)"></div>
      </div>
    </div>
    <div class="ed-foot">
      <button class="ed-foot-loc" id="edFootLoc" onclick="openLocationModal(currentLocProfile())">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        <span id="edFootLocText">위치 정보 없음</span>
      </button>
      <div class="ed-foot-stats-wrap">
        <div class="ed-foot-stats">
          <span id="edWords">0단어</span><div class="fs-sep"></div>
          <span id="edPages">0매</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 서재 에디터 -->
  <div id="editorBook" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="editor-scroll-area">
      <div class="editor-content-wrap">
        <div class="special-form">
          <div class="sf-field"><span class="sf-label">제목</span><input class="sf-input" id="book-title" placeholder="책 제목"></div>
          <div class="sf-row">
            <div class="sf-field" style="flex:2"><span class="sf-label">저자</span><input class="sf-input" id="book-author" placeholder="저자명"></div>
            <div class="sf-field" style="flex:2"><span class="sf-label">출판사</span><input class="sf-input" id="book-publisher" placeholder="출판사명"></div>
            <div class="sf-field" style="flex:1"><span class="sf-label">읽은 양 (p)</span><input class="sf-input" id="book-pages" placeholder="숫자만" type="number"></div>
          </div>
        </div>
        <div class="ed-body" id="book-body" contenteditable="true" spellcheck="false" translate="no" data-placeholder="책에 대한 메모..."></div>
      </div>
    </div>
  </div>

  <!-- 어구 에디터 -->
  <div id="editorQuote" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="editor-scroll-area">
      <div class="editor-content-wrap">
        <div class="special-form">
          <div class="sf-field"><span class="sf-label">출처</span><input class="sf-input" id="quote-by" placeholder="책 제목, 저자 등"></div>
        </div>
        <div class="ed-body" id="quote-body" contenteditable="true" spellcheck="false" translate="no" data-placeholder="인상 깊은 문장을 기록하세요..."></div>
      </div>
    </div>
  </div>

  <!-- 메모 에디터 -->
  <div id="editorMemo" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="editor-scroll-area">
      <div class="editor-content-wrap">
        <input class="ed-title" id="memo-title" placeholder="메모 제목">
        <div class="ed-body" id="memo-body" contenteditable="true" spellcheck="false" translate="no" data-placeholder="메모를 작성하세요... (이미지 복사+붙여넣기 가능)"></div>
      </div>
    </div>
  </div>

  <!-- 날짜별 다중 항목 리스트 (캘린더 클릭 시) -->
  <div id="editorDayList" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="editor-scroll-area">
      <div class="day-list-wrap" id="dayListWrap"></div>
    </div>
  </div>

  <!-- 가계부 입력/수정 에디터 (모바일) -->
  <div id="editorExpense" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="editor-scroll-area">
      <div class="editor-content-wrap">

        <!-- 금액 입력 -->
        <div class="expense-amount-field">
          <input type="text" inputmode="numeric" id="expenseAmountInput"
                 class="expense-amount-input" placeholder="금액을 입력하세요"
                 oninput="formatExpenseAmount(this)">
          <span class="expense-amount-unit">원</span>
        </div>

        <!-- 지출처 입력 -->
        <div class="expense-merchant-field">
          <input type="text" id="expenseMerchantInput"
                 class="expense-merchant-input" placeholder="지출처를 입력하세요">
        </div>

        <!-- 날짜/시간 -->
        <div class="expense-date-field">
          <span class="expense-date-label">지출일시</span>
          <span class="expense-date-value" id="expenseDateValue" onclick="openExpenseDatePicker()"></span>
        </div>

        <!-- 카테고리 선택 -->
        <div class="expense-category-section">
          <span class="expense-section-label">카테고리</span>
          <div class="expense-category-grid" id="expenseCategoryGrid">
            <!-- JS에서 EXPENSE_CATEGORIES 기반 렌더링 -->
          </div>
        </div>

        <!-- 카드/결제수단 (선택) -->
        <div class="expense-optional-field">
          <input type="text" id="expenseCardInput"
                 class="expense-optional-input" placeholder="카드/결제수단 (선택)">
        </div>

        <!-- 메모 (선택) -->
        <div class="expense-optional-field">
          <input type="text" id="expenseMemoInput"
                 class="expense-optional-input" placeholder="메모 (선택)">
        </div>

        <!-- 문자 붙여넣기 버튼 -->
        <button class="expense-paste-btn" id="expensePasteBtn" onclick="pasteFromClipboard()">
          문자 붙여넣기
        </button>

        <!-- 저장 버튼 -->
        <button class="expense-save-btn" id="expenseSaveBtn" onclick="saveExpenseForm()">
          확인
        </button>

      </div>
    </div>
  </div>

  <!-- 가계부 풀 대시보드 (PC/태블릿 — editor 내부) -->
  <div id="expenseFullDashboard" style="display:none;flex-direction:column;flex:1;overflow-y:auto">
    <div class="expense-full-scroll">
      <div class="expense-full-content">
        <div id="expFullDashboardPane">
          <!-- A. 대시보드 — JS에서 렌더링 -->
        </div>
        <div id="expFullDetailPane" style="display:none">
          <!-- B. 전체 내역 — JS에서 렌더링 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 루틴 상세 분석 (PC/태블릿 — editor 내부) -->
  <div id="editorRoutineDetail" style="display:none;flex-direction:column;flex:1;overflow-y:auto">
    <div class="routine-detail-scroll">
      <div class="routine-detail-content">
        <!-- JS에서 renderRoutineDetail(routineId) 또는 renderRoutineOverview()로 렌더링 -->
      </div>
    </div>
  </div>

</div><!-- /.editor -->

<!-- 가계부 입력/수정 모달 (전역 — PC/태블릿) -->
<div class="modal-overlay" id="expenseModalOverlay" style="display:none" onclick="onExpenseModalOverlayClick(event)">
  <div class="modal-card" style="max-width:480px;max-height:85vh;overflow-y:auto">
    <div class="modal-hdr">
      <div class="modal-title">지출 입력</div>
      <button class="modal-close" onclick="closeExpenseModal()">×</button>
    </div>
    <div class="modal-body" style="padding:20px">
      <!-- 금액 입력 -->
      <div class="expense-amount-field">
        <input type="text" inputmode="numeric" id="expenseAmountInputModal"
               class="expense-amount-input" placeholder="금액을 입력하세요"
               oninput="formatExpenseAmount(this)">
        <span class="expense-amount-unit">원</span>
      </div>

      <!-- 지출처 입력 -->
      <div class="expense-merchant-field">
        <input type="text" id="expenseMerchantInputModal"
               class="expense-merchant-input" placeholder="지출처를 입력하세요">
      </div>

      <!-- 날짜/시간 -->
      <div class="expense-date-field">
        <span class="expense-date-label">지출일시</span>
        <span class="expense-date-value" id="expenseDateValueModal" onclick="openExpenseDatePicker()"></span>
      </div>

      <!-- 카테고리 선택 -->
      <div class="expense-category-section">
        <span class="expense-section-label">카테고리</span>
        <div class="expense-category-grid" id="expenseCategoryGridModal">
          <!-- JS에서 렌더링 -->
        </div>
      </div>

      <!-- 카드/결제수단 (선택) -->
      <div class="expense-optional-field">
        <input type="text" id="expenseCardInputModal"
               class="expense-optional-input" placeholder="카드/결제수단 (선택)">
      </div>

      <!-- 메모 (선택) -->
      <div class="expense-optional-field">
        <input type="text" id="expenseMemoInputModal"
               class="expense-optional-input" placeholder="메모 (선택)">
      </div>

      <!-- 문자 붙여넣기 버튼 -->
      <button class="expense-paste-btn" id="expensePasteBtnModal" onclick="pasteFromClipboard('modal')">
        문자 붙여넣기
      </button>

      <!-- 저장 버튼 -->
      <button class="expense-save-btn" id="expenseSaveBtnModal" onclick="saveExpenseForm('modal')">
        확인
      </button>
    </div>
  </div>
</div>

<!-- ─── 위치 모달 ─── -->
<div class="modal-overlay" id="modalOverlay" onclick="onLocationOverlayClick(event)">
  <div class="modal-card">
    <div class="modal-hdr">
      <div class="modal-title">항목 정보</div>
      <button class="modal-close" onclick="closeLocationModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-addr">
      <div class="addr-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
      <div class="addr-texts">
        <div class="addr-main" id="addrMain"></div>
        <div class="addr-sub"  id="addrSub"></div>
      </div>
    </div>
    <div class="modal-map-wrap">
      <div class="modal-map"><canvas id="mapCanvas"></canvas></div>
    </div>
  </div>
</div>

</div><!-- /#mainApp -->
